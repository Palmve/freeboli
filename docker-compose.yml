# FreeBoli con Docker
# Uso: copia .env.example a .env, rellena las variables y ejecuta:
#   docker compose up -d --build
#
# La app quedará en http://localhost:3000 (o el puerto que definas).

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

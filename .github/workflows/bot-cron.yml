name: FreeBoli Bot Cron

on:
  schedule:
    # Se ejecuta cada hora en el minuto 15 (puedes cambiarlo)
    # Formato: min hora día mes día_semana
    - cron: '15 * * * *'
  
  # También permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  run-bot-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint del Bot Tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Falta el secret CRON_SECRET en GitHub Actions (Settings → Secrets)."
            exit 1
          fi
          curl -s -f -X GET "https://freeboli.win/api/bot/tick" \
            -H "Authorization: Bearer ${CRON_SECRET}"
          echo "Tick enviado al bot."
